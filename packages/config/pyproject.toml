[project]
name = "agent-secretary-config"
version = "0.0.0"
description = "Shared configuration constants for agent-secretary services"
requires-python = ">=3.11"
dependencies = [
    "pydantic>=2.7",
    "httpx>=0.27",
    "PyJWT>=2.9",
    "cryptography>=43",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["agent_secretary_config"]
