services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 2s
      retries: 5

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: agent_secretary
      POSTGRES_USER: agent
      POSTGRES_PASSWORD: agent
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agent"]
      interval: 5s
      timeout: 2s
      retries: 5

  ingress:
    build:
      context: ..
      dockerfile: services/ingress/Dockerfile
    environment:
      REDIS_URL: redis://redis:6379
      # Dashboard reads pr_trace from postgres
      DATABASE_URL: postgresql://agent:agent@postgres/agent_secretary
      GITHUB_WEBHOOK_SECRET: ${GITHUB_WEBHOOK_SECRET:-}
      SLACK_APP_TOKEN: ${SLACK_APP_TOKEN:-}
      SLACK_BOT_TOKEN: ${SLACK_BOT_TOKEN:-}
      SLACK_SIGNING_SECRET: ${SLACK_SIGNING_SECRET:-}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    ports:
      - "8080:8080"
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy

  core:
    build:
      context: ..
      dockerfile: services/core/Dockerfile
    environment:
      REDIS_URL: redis://redis:6379
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    depends_on:
      redis:
        condition: service_healthy

  agents:
    build:
      context: ..
      dockerfile: services/agents/Dockerfile
    environment:
      REDIS_URL: redis://redis:6379
      DATABASE_URL: postgresql://agent:agent@postgres/agent_secretary
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:?ANTHROPIC_API_KEY is required}
      # Workspace skill (bare repo + worktree) needs persistent storage + git auth
      AGENT_WORKSPACE_DIR: /var/agent-workspace
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    volumes:
      - agent_workspace:/var/agent-workspace
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy

  egress:
    build:
      context: ..
      dockerfile: services/egress/Dockerfile
    environment:
      REDIS_URL: redis://redis:6379
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      SLACK_BOT_TOKEN: ${SLACK_BOT_TOKEN:-}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    depends_on:
      redis:
        condition: service_healthy

volumes:
  pgdata:
  agent_workspace:
