<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>Agent Gateway</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: monospace; background: #0d1117; color: #c9d1d9; display: flex; height: 100vh; overflow: hidden; }

    /* Sidebar */
    #sidebar { width: 280px; border-right: 1px solid #21262d; display: flex; flex-direction: column; flex-shrink: 0; }
    #sidebar header { padding: 16px; border-bottom: 1px solid #21262d; }
    #sidebar header h1 { font-size: 13px; color: #8b949e; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 12px; }
    #prompt-input { width: 100%; background: #161b22; border: 1px solid #30363d; color: #c9d1d9; padding: 8px; border-radius: 6px; font-family: monospace; font-size: 12px; resize: none; height: 72px; }
    #run-btn { margin-top: 8px; width: 100%; background: #238636; color: #fff; border: none; padding: 7px; border-radius: 6px; cursor: pointer; font-size: 12px; }
    #run-btn:hover { background: #2ea043; }

    #session-list { flex: 1; overflow-y: auto; padding: 8px; display: flex; flex-direction: column; gap: 4px; }
    .session-item { padding: 10px 12px; border-radius: 6px; cursor: pointer; border: 1px solid transparent; }
    .session-item:hover { background: #161b22; }
    .session-item.active { background: #161b22; border-color: #30363d; }
    .session-item .s-prompt { font-size: 12px; color: #c9d1d9; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .session-item .s-meta { font-size: 11px; color: #6e7681; margin-top: 3px; display: flex; gap: 8px; }
    .badge { font-size: 10px; padding: 1px 6px; border-radius: 10px; }
    .badge.running { background: #1f3d2a; color: #3fb950; }
    .badge.done { background: #1c2128; color: #8b949e; }
    .badge.error { background: #3d1f1f; color: #f85149; }

    /* Main */
    #main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    #main-header { padding: 14px 20px; border-bottom: 1px solid #21262d; font-size: 12px; color: #6e7681; }
    #stream { flex: 1; overflow-y: auto; padding: 16px 20px; display: flex; flex-direction: column; gap: 6px; }
    #empty { flex: 1; display: flex; align-items: center; justify-content: center; color: #6e7681; font-size: 13px; }

    .msg { border-radius: 6px; padding: 10px 14px; font-size: 12px; line-height: 1.6; border-left: 3px solid transparent; }
    .msg.system   { background: #161b22; border-color: #58a6ff; }
    .msg.assistant { background: #0d2030; border-color: #3fb950; }
    .msg.user     { background: #1a1a2e; border-color: #d29922; }
    .msg.result   { background: #1a2e1a; border-color: #3fb950; }
    .msg.error    { background: #2e1a1a; border-color: #f85149; }
    .msg-type { font-size: 10px; color: #6e7681; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 1px; }
    pre { white-space: pre-wrap; word-break: break-all; }
    .tool-use { background: #1f2937; border-radius: 4px; padding: 6px 10px; margin-top: 4px; }
    .tool-name { color: #d29922; }
    .result-stats { display: flex; gap: 16px; font-size: 11px; color: #8b949e; margin-top: 6px; }
    .result-stats span { color: #c9d1d9; }
  </style>
</head>
<body>
  <div id="sidebar">
    <header>
      <h1>Agent Gateway</h1>
      <textarea id="prompt-input" placeholder="프롬프트 입력...">현재 디렉토리 파일 목록 알려줘</textarea>
      <button id="run-btn">실행</button>
    </header>
    <div id="session-list"></div>
  </div>
  <div id="main">
    <div id="main-header">세션을 선택하거나 새로 실행하세요</div>
    <div id="empty">←  세션 선택</div>
    <div id="stream" style="display:none"></div>
  </div>

  <script>
    let activeId = null;
    let activeSource = null;

    const sessionListEl = document.getElementById("session-list");
    const streamEl = document.getElementById("stream");
    const emptyEl = document.getElementById("empty");
    const headerEl = document.getElementById("main-header");

    function log(tag, ...args) {
      console.log(`[${new Date().toISOString()}] [ui] [${tag}]`, ...args);
    }

    async function loadSessions() {
      log("sessions", "fetching list");
      const res = await fetch("/sessions");
      const sessions = await res.json();
      log("sessions", `loaded count=${sessions.length}`);
      renderSessionList(sessions);
    }

    function renderSessionList(sessions) {
      sessionListEl.innerHTML = "";
      for (const s of sessions.slice().reverse()) {
        const el = document.createElement("div");
        el.className = `session-item${s.id === activeId ? " active" : ""}`;
        el.dataset.id = s.id;
        el.innerHTML = `
          <div class="s-prompt">${escHtml(s.prompt)}</div>
          <div class="s-meta">
            <span class="badge ${s.status}">${s.status}</span>
            <span>${s.messageCount}msg</span>
            <span>${new Date(s.createdAt).toLocaleTimeString("ko-KR")}</span>
          </div>`;
        el.addEventListener("click", () => selectSession(s.id, s.prompt));
        sessionListEl.appendChild(el);
      }
    }

    function selectSession(id, prompt) {
      log("select", `id=${id} prompt="${prompt.slice(0, 60)}"`);
      activeId = id;
      if (activeSource) {
        log("select", "closing previous EventSource");
        activeSource.close();
        activeSource = null;
      }
      streamEl.innerHTML = "";
      streamEl.style.display = "flex";
      emptyEl.style.display = "none";
      headerEl.textContent = prompt;
      document.querySelectorAll(".session-item").forEach(el => el.classList.toggle("active", el.dataset.id === id));

      log("stream", `opening EventSource /sessions/${id}/stream`);
      const es = new EventSource(`/sessions/${id}/stream`);
      activeSource = es;
      let msgCount = 0;
      es.onopen = () => log("stream", `EventSource connected id=${id}`);
      es.onerror = (e) => log("stream", `EventSource error readyState=${es.readyState}`, e);
      es.onmessage = (e) => {
        let data;
        try {
          data = JSON.parse(e.data);
        } catch (err) {
          log("stream", `JSON parse error: ${err.message} raw="${e.data.slice(0, 80)}"`);
          return;
        }
        if (data === null) {
          log("stream", `null received — stream end (total ${msgCount} messages)`);
          es.close();
          loadSessions();
          return;
        }
        msgCount++;
        log("stream", `msg #${msgCount} type=${data.type}${data.subtype ? "/" + data.subtype : ""}`);
        appendMsg(data);
      };
    }

    function appendMsg(msg) {
      if (msg.type === "rate_limit_event") return;

      const el = document.createElement("div");
      let cls = msg.type;
      let content = "";

      if (msg.type === "system" && msg.subtype === "init") {
        content = `<b>session:</b> ${msg.session_id}<br><b>model:</b> ${msg.model}<br><b>tools:</b> ${msg.tools?.length ?? 0}개`;
      } else if (msg.type === "system") {
        content = `<pre>${escHtml(JSON.stringify(msg, null, 2))}</pre>`;
      } else if (msg.type === "assistant") {
        for (const block of msg.message?.content ?? []) {
          if (block.type === "text") content += `<pre>${escHtml(block.text)}</pre>`;
          else if (block.type === "thinking") content += `<pre style="color:#6e7681">💭 ${escHtml(block.thinking.slice(0, 300))}</pre>`;
          else if (block.type === "tool_use") content += `<div class="tool-use"><span class="tool-name">🔧 ${block.name}</span><pre style="color:#8b949e;font-size:11px">${escHtml(JSON.stringify(block.input, null, 2))}</pre></div>`;
        }
        if (!content) return;
      } else if (msg.type === "user" && msg.message?.content?.some(b => b.type === "tool_result")) {
        const blocks = msg.message.content.filter(b => b.type === "tool_result");
        content = blocks.map(b => {
          const text = Array.isArray(b.content)
            ? b.content.map(c => c.text ?? "").join("")
            : (b.content ?? "");
          return `<b>tool result</b> <span style="color:#6e7681">${escHtml(b.tool_use_id ?? "")}</span><pre style="color:#8b949e">${escHtml(text.slice(0, 500))}</pre>`;
        }).join("");
      } else if (msg.type === "result") {
        cls = "result";
        content = `<pre>${escHtml(msg.result ?? "")}</pre><div class="result-stats"><span>turns</span> ${msg.num_turns} &nbsp;<span>time</span> ${(msg.duration_ms/1000).toFixed(1)}s &nbsp;<span>cost</span> $${msg.total_cost_usd?.toFixed(4) ?? "—"}</div>`;
      } else {
        content = `<pre>${escHtml(JSON.stringify(msg, null, 2))}</pre>`;
      }

      el.className = `msg ${cls}`;
      el.innerHTML = `<div class="msg-type">${msg.type}${msg.subtype ? ` / ${msg.subtype}` : ""}</div>${content}`;
      streamEl.appendChild(el);
      streamEl.scrollTop = streamEl.scrollHeight;
    }

    document.getElementById("run-btn").addEventListener("click", async () => {
      const prompt = document.getElementById("prompt-input").value.trim();
      if (!prompt) return;
      log("run", `POST /sessions prompt="${prompt.slice(0, 80)}"`);
      let res, body;
      try {
        res = await fetch("/sessions", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ prompt }),
        });
        body = await res.json();
      } catch (err) {
        log("run", `error: ${err.message}`);
        return;
      }
      log("run", `created id=${body.id} status=${res.status}`);
      await loadSessions();
      selectSession(body.id, prompt);
    });

    function escHtml(s) {
      return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
    }

    loadSessions();
    setInterval(loadSessions, 3000);
  </script>
</body>
</html>
