<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <title>agent-secretary · dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    :root {
      --bg: #0f1115;
      --panel: #161a22;
      --panel-2: #1d222c;
      --border: #2a313d;
      --fg: #e6e8eb;
      --fg-muted: #9aa3b2;
      --ok: #3fb950;
      --warn: #d29922;
      --escalate: #f85149;
      --link: #58a6ff;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI",
        Helvetica, Arial, sans-serif;
      background: var(--bg); color: var(--fg);
    }
    header {
      padding: 16px 24px; border-bottom: 1px solid var(--border);
      display: flex; align-items: baseline; gap: 16px;
    }
    header h1 { margin: 0; font-size: 18px; font-weight: 600; }
    header .sub { color: var(--fg-muted); font-size: 13px; }
    main { display: grid; grid-template-columns: 480px 1fr; height: calc(100vh - 56px - var(--kpi-h, 0px)); }
    .left { border-right: 1px solid var(--border); overflow-y: auto; }
    .right { padding: 20px; overflow-y: auto; }
    .kpi-row {
      display: flex; gap: 12px; padding: 12px 24px;
      border-bottom: 1px solid var(--border); background: var(--panel);
      align-items: stretch; flex-wrap: wrap;
    }
    .kpi-card {
      flex: 1 1 140px; min-width: 140px; padding: 10px 14px;
      background: var(--panel-2); border: 1px solid var(--border);
      border-radius: 6px;
    }
    .kpi-card .label {
      color: var(--fg-muted); font-size: 11px; text-transform: uppercase;
      letter-spacing: 0.04em; margin-bottom: 4px;
    }
    .kpi-card .value { font-size: 20px; font-weight: 600; }
    .kpi-card .sub {
      color: var(--fg-muted); font-size: 11px; margin-top: 2px;
    }
    .kpi-card.escalate .value { color: var(--escalate); }
    .kpi-card.auto .value { color: var(--ok); }
    .kpi-card.changes .value { color: var(--warn); }
    .range-picker {
      display: flex; gap: 4px; align-items: center;
      margin-left: auto; align-self: center;
    }
    .range-picker button {
      background: var(--panel-2); color: var(--fg-muted);
      border: 1px solid var(--border); padding: 4px 10px;
      border-radius: 4px; cursor: pointer; font-size: 12px;
    }
    .range-picker button.active {
      background: var(--bg); color: var(--fg); border-color: var(--link);
    }
    .hist-row {
      padding: 10px 24px; border-bottom: 1px solid var(--border);
      background: var(--panel); display: flex; gap: 12px; align-items: center;
    }
    .hist-row .hist-label {
      color: var(--fg-muted); font-size: 11px; text-transform: uppercase;
      letter-spacing: 0.04em; min-width: 130px;
    }
    .hist-row svg { flex: 1 1 auto; height: 64px; display: block; }
    .hist-bar { fill: var(--link); }
    .hist-bar.lo { fill: var(--escalate); }
    .hist-bar.mid { fill: var(--warn); }
    .hist-bar.hi { fill: var(--ok); }
    .hist-axis { stroke: var(--border); stroke-width: 1; }
    .hist-tick { fill: var(--fg-muted); font-size: 10px; font-family: ui-monospace, "SF Mono", monospace; }
    .hist-empty { color: var(--fg-muted); font-size: 12px; }
    .ab-row {
      padding: 10px 24px; border-bottom: 1px solid var(--border);
      background: var(--panel); display: flex; gap: 16px; align-items: center;
      flex-wrap: wrap; font-size: 12px;
    }
    .ab-row .ab-label {
      color: var(--fg-muted); font-size: 11px; text-transform: uppercase;
      letter-spacing: 0.04em; min-width: 130px;
    }
    .ab-row .ab-stat { color: var(--fg); }
    .ab-row .ab-stat strong { color: var(--fg); font-weight: 600; }
    .ab-row a.diff {
      color: var(--escalate); text-decoration: none;
      padding: 2px 8px; border-radius: 4px; background: rgba(248,81,73,.10);
      font-family: ui-monospace, "SF Mono", monospace; font-size: 11px;
    }
    .ab-row a.diff:hover { background: rgba(248,81,73,.20); }
    .row .compare-link {
      font-size: 11px; color: var(--link); text-decoration: none;
      padding: 1px 6px; border-radius: 3px; background: var(--panel);
      margin-left: 8px;
    }
    .row .compare-link:hover { background: var(--panel-2); }
    .queues-row {
      display: flex; gap: 10px; padding: 10px 24px;
      border-bottom: 1px solid var(--border); background: var(--panel-2);
      align-items: center; flex-wrap: wrap;
    }
    .queues-row .q-label {
      color: var(--fg-muted); font-size: 11px; text-transform: uppercase;
      letter-spacing: 0.04em; min-width: 100px;
    }
    .q-pair {
      display: inline-flex; gap: 6px; align-items: center;
      padding: 4px 10px; background: var(--panel); border: 1px solid var(--border);
      border-radius: 4px; font-size: 12px;
      font-family: ui-monospace, "SF Mono", monospace;
    }
    .q-pair .q-name { color: var(--fg-muted); }
    .q-pair .q-depth { color: var(--fg); font-weight: 600; }
    .q-pair .q-age { color: var(--fg-muted); font-size: 11px; }
    .q-pair.alert { border-color: var(--warn); background: rgba(210,153,34,0.10); }
    .q-pair.crit  { border-color: var(--escalate); background: rgba(248,81,73,0.10); }
    .q-pair .q-pending {
      color: var(--warn); font-size: 11px; padding-left: 6px;
      border-left: 1px solid var(--border);
    }
    .q-pair .q-dlq.nonzero { color: var(--escalate); font-weight: 600; }
    .ops-row {
      display: flex; gap: 14px; padding: 10px 24px;
      border-bottom: 1px solid var(--border); background: var(--panel);
      align-items: center; flex-wrap: wrap; font-size: 12px;
    }
    .ops-row .ops-label {
      color: var(--fg-muted); font-size: 11px; text-transform: uppercase;
      letter-spacing: 0.04em; min-width: 80px;
    }
    .ops-stat {
      display: inline-flex; gap: 6px; align-items: baseline;
      padding: 3px 10px; background: var(--panel-2); border: 1px solid var(--border);
      border-radius: 4px;
    }
    .ops-stat .ops-k {
      color: var(--fg-muted); font-size: 11px; text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .ops-stat .ops-v { color: var(--fg); font-weight: 600; }
    .ops-stat .ops-sub { color: var(--fg-muted); font-size: 11px; }
    .ops-row .ops-warn { color: var(--warn); font-size: 11px; }
    .breakdown-tabs {
      display: flex; gap: 4px; margin-bottom: 12px;
    }
    .breakdown-tabs button {
      background: var(--panel-2); color: var(--fg-muted);
      border: 1px solid var(--border); padding: 4px 12px;
      border-radius: 4px; cursor: pointer; font-size: 12px;
    }
    .breakdown-tabs button.active {
      background: var(--bg); color: var(--fg); border-color: var(--link);
    }
    .breakdown-table {
      width: 100%; border-collapse: collapse; font-size: 13px;
    }
    .breakdown-table th, .breakdown-table td {
      text-align: left; padding: 8px 10px;
      border-bottom: 1px solid var(--border);
    }
    .breakdown-table th {
      color: var(--fg-muted); font-weight: 500; font-size: 11px;
      text-transform: uppercase; letter-spacing: 0.04em;
    }
    .breakdown-table td.num { text-align: right; font-variant-numeric: tabular-nums; }
    .breakdown-table tr:hover { background: var(--panel); }
    .breakdown-bar {
      display: inline-block; height: 6px; border-radius: 2px;
      vertical-align: middle; margin-right: 1px;
    }
    .breakdown-bar.auto { background: var(--ok); }
    .breakdown-bar.changes { background: var(--warn); }
    .breakdown-bar.escalate { background: var(--escalate); }
    .breakdown-name {
      font-family: ui-monospace, "SF Mono", monospace; font-size: 12px;
    }
    .banner {
      background: var(--panel); border-bottom: 1px solid var(--border);
      padding: 10px 16px; color: var(--warn); font-size: 13px;
    }
    .row {
      display: block; padding: 12px 16px;
      border-bottom: 1px solid var(--border); cursor: pointer;
      text-decoration: none; color: inherit;
    }
    .row:hover { background: var(--panel); }
    .row.selected { background: var(--panel-2); }
    .row .top {
      display: flex; justify-content: space-between; align-items: center;
      gap: 8px; margin-bottom: 4px;
    }
    .row .workflow {
      font-family: ui-monospace, "SF Mono", monospace; font-size: 11px;
      padding: 2px 6px; border-radius: 4px; background: var(--panel-2);
      color: var(--fg-muted);
    }
    .row .decision {
      font-size: 11px; padding: 2px 8px; border-radius: 10px; font-weight: 600;
    }
    .decision.auto-merge { background: rgba(63,185,80,.15); color: var(--ok); }
    .decision.escalate-to-human { background: rgba(248,81,73,.15); color: var(--escalate); }
    .decision.request-changes { background: rgba(210,153,34,.15); color: var(--warn); }
    .decision.none { background: var(--panel-2); color: var(--fg-muted); }
    .row .summary { color: var(--fg); font-size: 13px; line-height: 1.4; }
    .row .meta {
      display: flex; gap: 12px; font-size: 11px; color: var(--fg-muted);
      margin-top: 4px;
    }
    .empty { padding: 40px; text-align: center; color: var(--fg-muted); }
    h2 { font-size: 15px; margin: 0 0 8px; }
    section.detail { margin-bottom: 20px; }
    section.detail h2 { color: var(--fg-muted); font-weight: 500; }
    pre {
      background: var(--panel); border: 1px solid var(--border);
      border-radius: 6px; padding: 12px; overflow-x: auto;
      font-size: 12px; line-height: 1.5;
    }
    .summary-rendered {
      background: var(--panel); border: 1px solid var(--border);
      border-radius: 6px; padding: 12px; white-space: pre-wrap;
      font-size: 13px; line-height: 1.5;
    }
    button.refresh {
      background: var(--panel-2); color: var(--fg); border: 1px solid var(--border);
      padding: 4px 10px; border-radius: 4px; cursor: pointer; font-size: 12px;
    }
    button.refresh:hover { background: var(--panel); }
    input.search {
      background: var(--panel-2); color: var(--fg);
      border: 1px solid var(--border); border-radius: 4px;
      padding: 4px 10px; font-size: 12px; width: 280px;
      font-family: inherit;
    }
    input.search:focus {
      outline: none; border-color: var(--link);
      background: var(--bg);
    }
    input.search::placeholder { color: var(--fg-muted); }
    .filter-bar {
      display: flex; gap: 8px; padding: 10px 16px;
      border-bottom: 1px solid var(--border); background: var(--panel);
      align-items: center; flex-wrap: wrap;
    }
    .filter-bar select {
      background: var(--panel-2); color: var(--fg); border: 1px solid var(--border);
      padding: 4px 8px; border-radius: 4px; font-size: 12px;
    }
    .filter-bar .label-tag {
      color: var(--fg-muted); font-size: 11px; text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .filter-bar button.clear {
      background: transparent; border: none; color: var(--link);
      cursor: pointer; font-size: 12px;
    }
    .left { display: flex; flex-direction: column; }
    .left > .filter-bar { flex: 0 0 auto; }
    .left > .list-rows { flex: 1 1 auto; overflow-y: auto; }
  </style>
</head>
<body>
  <header>
    <h1>agent-secretary</h1>
    <span class="sub">trace dashboard</span>
    <input
      id="search"
      type="search"
      class="search"
      placeholder="search task_id / event_id / repo / title…"
      oninput="onSearchInput(event)"
    />
    <button class="refresh" onclick="loadList(); loadKpi(); loadHistogram(); loadAb(); loadOps(); loadQueues();">↻ refresh</button>
  </header>
  <div id="banner"></div>
  <div class="queues-row" id="queues" style="display:none"></div>
  <div class="kpi-row" id="kpi"></div>
  <div class="hist-row" id="hist"></div>
  <div class="ops-row" id="ops" style="display:none"></div>
  <div class="ab-row" id="ab" style="display:none"></div>
  <main>
    <div class="left">
      <div class="filter-bar">
        <span class="label-tag">decision</span>
        <select id="f-decision" onchange="setFilter('decision', this.value)">
          <option value="">all</option>
          <option value="auto-merge">auto-merge</option>
          <option value="request-changes">request-changes</option>
          <option value="escalate-to-human">escalate-to-human</option>
          <option value="none">(no decision)</option>
        </select>
        <span class="label-tag">workflow</span>
        <select id="f-workflow" onchange="setFilter('workflow', this.value)">
          <option value="">all</option>
          <option value="pr_review">pr_review</option>
          <option value="pr_review_monolithic">pr_review_monolithic</option>
          <option value="code_analyze">code_analyze</option>
          <option value="code_modify">code_modify</option>
          <option value="linear_issue">linear_issue</option>
        </select>
        <span class="label-tag">range</span>
        <select id="f-range" onchange="setFilter('range', this.value)">
          <option value="">all-time</option>
          <option value="1h">1h</option>
          <option value="6h">6h</option>
          <option value="24h">24h</option>
          <option value="7d">7d</option>
          <option value="30d">30d</option>
        </select>
        <button class="clear" onclick="clearFilters()">clear</button>
      </div>
      <div class="list-rows" id="list"><div class="empty">로딩 중…</div></div>
    </div>
    <div class="right" id="detail"></div>
  </main>

  <script>
    let selectedTaskId = null;
    let kpiRange = '24h';
    const RANGE_LABELS = { '1h': '최근 1시간', '6h': '최근 6시간', '24h': '최근 24시간', '7d': '최근 7일', '30d': '최근 30일', 'all': '전체' };

    // List filter state. Persisted in the URL query string so reloads /
    // shared links keep the same view.
    const filters = { decision: '', workflow: '', range: '', q: '' };

    function readFiltersFromUrl() {
      const q = new URLSearchParams(location.search);
      for (const k of Object.keys(filters)) {
        const v = q.get(k);
        if (v != null) filters[k] = v;
      }
    }

    function syncFilterUI() {
      document.getElementById('f-decision').value = filters.decision || '';
      document.getElementById('f-workflow').value = filters.workflow || '';
      document.getElementById('f-range').value = filters.range || '';
      document.getElementById('search').value = filters.q || '';
    }

    let breakdownDim = 'repo';

    async function loadBreakdown() {
      const detail = document.getElementById('detail');
      // Skip while a trace is selected — don't replace its detail view.
      if (selectedTaskId) return;
      try {
        const res = await fetch('/api/stats/' + (breakdownDim === 'repo' ? 'by_repo' : 'by_channel') + '?range=' + encodeURIComponent(kpiRange));
        if (res.status === 503) {
          detail.innerHTML = '<div class="empty">DB 연결 없음</div>';
          return;
        }
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const data = await res.json();
        detail.innerHTML = renderBreakdown(data);
      } catch (e) {
        detail.innerHTML = `<div class="empty">불러오기 실패: ${escapeHtml(e.message)}</div>`;
      }
    }

    function setBreakdown(dim) {
      breakdownDim = dim;
      loadBreakdown();
    }

    function renderBreakdown(data) {
      const rangeLabel = RANGE_LABELS[data.range] || data.range;
      const tabs = `
        <div class="breakdown-tabs">
          <button class="${breakdownDim === 'repo' ? 'active' : ''}" onclick="setBreakdown('repo')">by repo</button>
          <button class="${breakdownDim === 'channel' ? 'active' : ''}" onclick="setBreakdown('channel')">by channel</button>
        </div>
      `;
      if (!data.items.length) {
        return `${tabs}<div class="empty">${rangeLabel} 동안 ${data.dimension} 별 데이터가 없습니다.</div>`;
      }
      const maxTotal = Math.max(...data.items.map(i => i.total));
      const rows = data.items.map(i => {
        const dim = i.dim;
        // Build proportional stacked bar — relative to the row's total
        // (so smaller-total rows still show their decision mix clearly).
        const W = 100;
        const a = i.auto_merge / i.total * W;
        const c = i.request_changes / i.total * W;
        const e = i.escalate / i.total * W;
        const escRate = (100 * (i.escalation_rate || 0)).toFixed(0) + '%';
        const conf = i.avg_confidence == null ? '—' : (+i.avg_confidence).toFixed(2);
        // Rough volume indicator — width ratio against the row with the
        // most traces. Helps eye-track which rows carry the most weight.
        const volume = (i.total / maxTotal * 60 + 4).toFixed(0);
        return `<tr>
          <td>
            <div class="breakdown-name">${escapeHtml(dim)}</div>
            <div style="margin-top:4px">
              <span class="breakdown-bar auto" style="width:${a}%"></span><span class="breakdown-bar changes" style="width:${c}%"></span><span class="breakdown-bar escalate" style="width:${e}%"></span>
            </div>
          </td>
          <td class="num">${i.total}<div style="display:inline-block;width:${volume}px;height:4px;background:var(--link);opacity:0.4;border-radius:2px;margin-left:6px;vertical-align:middle"></div></td>
          <td class="num">${i.auto_merge}</td>
          <td class="num">${i.request_changes}</td>
          <td class="num" style="color:var(--escalate)">${i.escalate}</td>
          <td class="num">${escRate}</td>
          <td class="num">${conf}</td>
        </tr>`;
      }).join('');
      return `
        ${tabs}
        <h2 style="margin-bottom:8px">Breakdown · ${rangeLabel}</h2>
        <table class="breakdown-table">
          <thead><tr>
            <th>${data.dimension}</th>
            <th class="num">total</th>
            <th class="num">auto</th>
            <th class="num">changes</th>
            <th class="num">escalate</th>
            <th class="num">esc rate</th>
            <th class="num">avg conf</th>
          </tr></thead>
          <tbody>${rows}</tbody>
        </table>
      `;
    }

    let searchDebounce = null;
    function onSearchInput(event) {
      clearTimeout(searchDebounce);
      const value = event.target.value;
      // 250ms debounce — keystrokes shouldn't each fire a query.
      searchDebounce = setTimeout(() => setFilter('q', value), 250);
    }

    function writeFiltersToUrl() {
      const q = new URLSearchParams();
      for (const [k, v] of Object.entries(filters)) {
        if (v) q.set(k, v);
      }
      const qs = q.toString();
      const next = qs ? '?' + qs : location.pathname;
      history.replaceState(null, '', next);
    }

    function setFilter(key, value) {
      filters[key] = value || '';
      writeFiltersToUrl();
      loadList();
    }

    function clearFilters() {
      filters.decision = '';
      filters.workflow = '';
      filters.range = '';
      filters.q = '';
      syncFilterUI();
      writeFiltersToUrl();
      loadList();
    }

    function listQuery(extra) {
      const q = new URLSearchParams({ limit: '100', ...(extra || {}) });
      for (const [k, v] of Object.entries(filters)) {
        if (v) q.set(k, v);
      }
      return q.toString();
    }

    function pct(n, total) {
      if (!total) return '0%';
      return (100 * n / total).toFixed(0) + '%';
    }

    async function loadKpi() {
      const el = document.getElementById('kpi');
      try {
        const res = await fetch('/api/stats/decisions?range=' + encodeURIComponent(kpiRange));
        if (res.status === 503) {
          el.innerHTML = '';
          return;
        }
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const s = await res.json();
        const conf = s.avg_confidence == null ? '—' : (+s.avg_confidence).toFixed(2);
        const escRate = (100 * (s.escalation_rate || 0)).toFixed(0) + '%';
        const rangeButtons = ['1h','6h','24h','7d','30d','all'].map(r =>
          `<button class="${r === kpiRange ? 'active' : ''}" onclick="setRange('${r}')">${r}</button>`
        ).join('');
        el.innerHTML = `
          <div class="kpi-card">
            <div class="label">Total · ${RANGE_LABELS[s.range] || s.range}</div>
            <div class="value">${s.total}</div>
            <div class="sub">decisions completed</div>
          </div>
          <div class="kpi-card auto">
            <div class="label">Auto-merge</div>
            <div class="value">${s.auto_merge}</div>
            <div class="sub">${pct(s.auto_merge, s.total)}</div>
          </div>
          <div class="kpi-card changes">
            <div class="label">Request changes</div>
            <div class="value">${s.request_changes}</div>
            <div class="sub">${pct(s.request_changes, s.total)}</div>
          </div>
          <div class="kpi-card escalate">
            <div class="label">Escalate to human</div>
            <div class="value">${s.escalate}</div>
            <div class="sub">${pct(s.escalate, s.total)} · escalation rate ${escRate}</div>
          </div>
          <div class="kpi-card">
            <div class="label">Avg confidence</div>
            <div class="value">${conf}</div>
            <div class="sub">${s.no_decision ? s.no_decision + ' missing decision' : 'all decided'}</div>
          </div>
          <div class="range-picker">${rangeButtons}</div>
        `;
        document.documentElement.style.setProperty('--kpi-h', el.offsetHeight + 'px');
      } catch (e) {
        el.innerHTML = `<div class="kpi-card"><div class="label">stats</div><div class="value">—</div><div class="sub">불러오기 실패</div></div>`;
      }
    }

    function setRange(r) {
      kpiRange = r;
      loadKpi();
      loadHistogram();
      loadAb();
      loadOps();
      loadBreakdown();
    }

    function fmtTokens(n) {
      if (n == null) return '—';
      if (n < 1_000) return String(n);
      if (n < 1_000_000) return (n / 1_000).toFixed(1) + 'k';
      return (n / 1_000_000).toFixed(2) + 'M';
    }

    function fmtMs(n) {
      if (n == null) return '—';
      if (n < 1_000) return n + 'ms';
      return (n / 1000).toFixed(1) + 's';
    }

    async function loadOps() {
      const el = document.getElementById('ops');
      try {
        const res = await fetch('/api/stats/operations?range=' + encodeURIComponent(kpiRange));
        if (res.status === 503) { el.style.display = 'none'; return; }
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const s = await res.json();
        if (!s.rows_considered) { el.style.display = 'none'; return; }
        el.style.display = 'flex';
        const t = s.totals;
        const cost = '$' + (s.cost_usd || 0).toFixed(2);
        const totalTokens = (t.input_tokens || 0) + (t.output_tokens || 0);
        const cacheTokens = (t.cache_read_tokens || 0) + (t.cache_creation_tokens || 0);
        const warn = (s.unknown_models || []).length
          ? `<span class="ops-warn">unknown model(s): ${s.unknown_models.join(', ')}</span>`
          : '';
        el.innerHTML = `
          <span class="ops-label">ops</span>
          <span class="ops-stat">
            <span class="ops-k">cost</span><span class="ops-v">${cost}</span>
            <span class="ops-sub">${s.rows_considered} runs</span>
          </span>
          <span class="ops-stat">
            <span class="ops-k">tokens</span><span class="ops-v">${fmtTokens(totalTokens)}</span>
            <span class="ops-sub">in ${fmtTokens(t.input_tokens)} · out ${fmtTokens(t.output_tokens)}</span>
          </span>
          ${cacheTokens ? `<span class="ops-stat"><span class="ops-k">cache</span><span class="ops-v">${fmtTokens(cacheTokens)}</span></span>` : ''}
          <span class="ops-stat">
            <span class="ops-k">latency</span>
            <span class="ops-v">${fmtMs(s.duration_ms_p50)}</span>
            <span class="ops-sub">p50 · p95 ${fmtMs(s.duration_ms_p95)} · avg ${fmtMs(s.duration_ms_avg)}</span>
          </span>
          ${warn}
        `;
      } catch (e) {
        el.style.display = 'flex';
        el.innerHTML = `<span class="ops-label">ops</span><span class="hist-empty">불러오기 실패</span>`;
      }
    }

    function fmtAge(s) {
      if (s == null) return '';
      if (s < 60) return s.toFixed(0) + 's';
      if (s < 3600) return (s / 60).toFixed(0) + 'm';
      if (s < 86400) return (s / 3600).toFixed(1) + 'h';
      return (s / 86400).toFixed(1) + 'd';
    }

    async function loadQueues() {
      const el = document.getElementById('queues');
      try {
        const res = await fetch('/api/health/queues');
        if (res.status === 503) { el.style.display = 'none'; return; }
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const s = await res.json();
        el.style.display = 'flex';
        const pairs = s.pairs.map(p => {
          const live = p.live, dlq = p.dlq;
          const pending = (live.groups || []).reduce((a, g) => a + (g.pending || 0), 0);
          // Severity heuristics (pending-based — oldest_age is stream history, not lag):
          //   crit  if anything in DLQ, or pending > 100
          //   alert if pending > 10
          let cls = '';
          if (dlq.length > 0 || pending > 100) {
            cls = 'crit';
          } else if (pending > 10) {
            cls = 'alert';
          }
          const ageStr = live.length ? `· age ${fmtAge(live.oldest_age_seconds)}` : '';
          const pendStr = pending ? `<span class="q-pending">pending ${pending}</span>` : '';
          const dlqClass = dlq.length ? 'q-dlq nonzero' : 'q-dlq';
          return `<span class="q-pair ${cls}">
            <span class="q-name">${live.name}</span>
            <span class="q-depth">${live.length}</span>
            <span class="q-age">${ageStr}</span>
            ${pendStr}
            <span class="${dlqClass}" title="DLQ depth">dlq ${dlq.length}</span>
          </span>`;
        }).join('');
        el.innerHTML = `<span class="q-label">queues</span>${pairs}`;
      } catch (e) {
        el.style.display = 'flex';
        el.innerHTML = `<span class="q-label">queues</span><span class="hist-empty">불러오기 실패</span>`;
      }
    }

    async function loadAb() {
      const el = document.getElementById('ab');
      try {
        const res = await fetch('/api/stats/ab?range=' + encodeURIComponent(kpiRange));
        if (res.status === 503) { el.style.display = 'none'; return; }
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const s = await res.json();
        if (!s.total_pairs) { el.style.display = 'none'; return; }
        el.style.display = 'flex';
        const rate = (100 * s.agreement_rate).toFixed(0) + '%';
        const diffs = s.pairs.filter(p => p.primary_decision !== p.shadow_decision).slice(0, 6);
        const diffLinks = diffs.map(p =>
          `<a class="diff" href="/static/dashboard/compare/${encodeURIComponent(p.event_id)}" title="primary=${p.primary_decision || '—'} · shadow=${p.shadow_decision || '—'}">
            ${escapeHtml((p.event_id || '').slice(0, 12))}
          </a>`
        ).join(' ');
        el.innerHTML = `
          <span class="ab-label">A/B agreement</span>
          <span class="ab-stat"><strong>${rate}</strong> (${s.agree}/${s.total_pairs})</span>
          ${s.disagree
            ? `<span class="ab-stat">${s.disagree} disagreement${s.disagree === 1 ? '' : 's'}: ${diffLinks}</span>`
            : '<span class="ab-stat">no disagreements</span>'}
        `;
      } catch (e) {
        el.style.display = 'flex';
        el.innerHTML = `<span class="ab-label">A/B agreement</span><span class="hist-empty">불러오기 실패</span>`;
      }
    }

    async function loadHistogram() {
      const el = document.getElementById('hist');
      try {
        const res = await fetch('/api/stats/confidence?range=' + encodeURIComponent(kpiRange));
        if (res.status === 503) { el.innerHTML = ''; return; }
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const s = await res.json();
        if (!s.total) {
          el.innerHTML = `<span class="hist-label">confidence</span><span class="hist-empty">표본 없음 (${RANGE_LABELS[s.range] || s.range})</span>`;
          return;
        }
        const max = Math.max(...s.bins.map(b => b.count));
        const W = 600, H = 60, pad = 16;
        const bw = (W - pad * 2) / s.bins.length;
        const bars = s.bins.map((b, i) => {
          const h = max > 0 ? (b.count / max) * (H - 12) : 0;
          const x = pad + i * bw;
          const y = H - h;
          // Color hint: low confidence = escalate-ish, mid = warn, high = ok.
          const cls = b.lo < 0.4 ? 'lo' : b.lo < 0.7 ? 'mid' : 'hi';
          const tip = `[${b.lo.toFixed(1)}–${(b.hi).toFixed(1)}${i === 9 ? ']' : ')'}: ${b.count}`;
          return `<g><rect class="hist-bar ${cls}" x="${x + 1}" y="${y}" width="${bw - 2}" height="${h}"><title>${tip}</title></rect>`
               + (b.count ? `<text class="hist-tick" x="${x + bw / 2}" y="${y - 2}" text-anchor="middle">${b.count}</text>` : '')
               + `</g>`;
        }).join('');
        const ticks = [0, 0.5, 1.0].map(v => {
          const x = pad + v * (W - pad * 2);
          return `<text class="hist-tick" x="${x}" y="${H + 10}" text-anchor="middle">${v.toFixed(1)}</text>`;
        }).join('');
        el.innerHTML = `
          <span class="hist-label">confidence · n=${s.total}</span>
          <svg viewBox="0 0 ${W} ${H + 14}" preserveAspectRatio="none">
            <line class="hist-axis" x1="${pad}" y1="${H}" x2="${W - pad}" y2="${H}"/>
            ${bars}
            ${ticks}
          </svg>
        `;
      } catch (e) {
        el.innerHTML = `<span class="hist-label">confidence</span><span class="hist-empty">불러오기 실패</span>`;
      }
    }

    function decisionClass(d) {
      if (!d) return 'none';
      return ['auto-merge', 'escalate-to-human', 'request-changes'].includes(d) ? d : 'none';
    }

    function fmtTime(s) {
      if (!s) return '';
      const d = new Date(s);
      return d.toLocaleString('ko-KR', { hour12: false });
    }

    async function loadList() {
      const list = document.getElementById('list');
      const banner = document.getElementById('banner');
      try {
        const res = await fetch('/api/traces?' + listQuery());
        if (res.status === 503) {
          banner.className = 'banner';
          banner.textContent = '⚠️ DATABASE_URL 미설정 — 트레이스를 불러올 수 없습니다.';
          list.innerHTML = '<div class="empty">DB 연결 없음</div>';
          return;
        }
        if (!res.ok) throw new Error('HTTP ' + res.status);
        banner.textContent = '';
        const data = await res.json();
        if (!data.items.length) {
          list.innerHTML = '<div class="empty">아직 트레이스가 없습니다.</div>';
          return;
        }
        list.innerHTML = data.items.map(item => {
          const d = item.decision;
          const dc = decisionClass(d);
          const summary = (item.summary_markdown || '').slice(0, 160);
          const sel = item.task_id === selectedTaskId ? ' selected' : '';
          const compareLink = (item.workflow === 'pr_review' || item.workflow === 'pr_review_monolithic') && item.event_id
            ? `<a class="compare-link" href="/static/dashboard/compare/${encodeURIComponent(item.event_id)}" onclick="event.stopPropagation()" title="A/B 비교">A/B ↗</a>`
            : '';
          return `
            <a class="row${sel}" data-id="${item.task_id}" onclick="loadDetail('${item.task_id}'); return false;" href="#${item.task_id}">
              <div class="top">
                <span class="workflow">${item.workflow}</span>
                <span>
                  <span class="decision ${dc}">${d || '—'}</span>
                  ${compareLink}
                </span>
              </div>
              <div class="summary">${escapeHtml(summary)}${item.summary_markdown && item.summary_markdown.length > 160 ? '…' : ''}</div>
              <div class="meta">
                <span>${item.source_channel}</span>
                <span>${fmtTime(item.completed_at || item.created_at)}</span>
                ${item.confidence ? `<span>conf ${(+item.confidence).toFixed(2)}</span>` : ''}
              </div>
            </a>`;
        }).join('');
      } catch (e) {
        list.innerHTML = `<div class="empty">불러오기 실패: ${escapeHtml(e.message)}</div>`;
      }
    }

    async function loadDetail(taskId) {
      selectedTaskId = taskId;
      document.querySelectorAll('.row').forEach(r => r.classList.toggle('selected', r.dataset.id === taskId));
      const detail = document.getElementById('detail');
      detail.innerHTML = '<div class="empty">로딩 중…</div>';
      try {
        const res = await fetch('/api/traces/' + encodeURIComponent(taskId));
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const data = await res.json();
        detail.innerHTML = renderDetail(data);
      } catch (e) {
        detail.innerHTML = `<div class="empty">불러오기 실패: ${escapeHtml(e.message)}</div>`;
      }
    }

    function renderDetail(t) {
      const sec = (title, content) => `
        <section class="detail">
          <h2>${title}</h2>
          ${content}
        </section>`;
      const code = obj => obj == null
        ? '<div class="empty" style="text-align:left;padding:8px 0">(없음)</div>'
        : `<pre>${escapeHtml(JSON.stringify(obj, null, 2))}</pre>`;
      return [
        sec('Task',
          `<pre>${escapeHtml(JSON.stringify({
            task_id: t.task_id,
            event_id: t.event_id,
            workflow: t.workflow,
            source_channel: t.source_channel,
            created_at: t.created_at,
            completed_at: t.completed_at,
          }, null, 2))}</pre>`),
        sec('Summary',
          t.summary_markdown
            ? `<div class="summary-rendered">${escapeHtml(t.summary_markdown)}</div>`
            : '<div class="empty" style="text-align:left;padding:8px 0">(없음)</div>'),
        sec('CTO output', code(t.cto_output)),
        sec('Risk metadata', code(t.risk_metadata)),
        sec('Dispatcher output', code(t.dispatcher_output)),
        sec('Lead outputs', code(t.lead_outputs)),
        sec('Specialist outputs', code(t.specialist_outputs)),
        sec('Human decision', code(t.human_decision)),
        sec('PR / context metadata', code(t.pr_metadata)),
      ].join('');
    }

    function escapeHtml(s) {
      return String(s).replace(/[&<>"']/g, c => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[c]));
    }

    readFiltersFromUrl();
    syncFilterUI();
    loadList();
    loadKpi();
    loadHistogram();
    loadAb();
    loadOps();
    loadBreakdown();
    loadQueues();
    setInterval(loadList, 30000);  // refresh every 30s
    setInterval(loadKpi, 30000);
    setInterval(loadHistogram, 30000);
    setInterval(loadAb, 30000);
    setInterval(loadOps, 30000);
    setInterval(loadBreakdown, 30000);
    setInterval(loadQueues, 10000);  // queue health is operational — poll faster
  </script>
</body>
</html>
